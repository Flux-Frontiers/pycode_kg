repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
        exclude: '^(src|docs|article)/.*\.(png|jpg|jpeg|gif|pdf|html)$|^\.pycodekg/'
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
        exclude: '^\.claude/'
        pass_filenames: false
        always_run: true
      - id: ruff-format
        exclude: '^\.claude/'
        pass_filenames: false
        always_run: true

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline', '--exclude-files', '\.(pycodekg|dockg)/snapshots/.*']

  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: poetry run pylint src/
        language: system
        pass_filenames: false
        always_run: true
        args: ['--rcfile=pyproject.toml']
      - id: mypy
        name: mypy
        entry: poetry run mypy src/
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest
        entry: poetry run pytest --tb=short -q
        language: system
        pass_filenames: false
        always_run: true
